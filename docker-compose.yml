services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: orymar_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  dao-service:
    build:
      context: .
      dockerfile: core-service/Dockerfile
    container_name: dao_service
    ports:
      - "8080:8080"
    depends_on:
      - postgres-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/orymar_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password

  core-service:
    build:
      context: .
      dockerfile: core-service/Dockerfile
    container_name: core_service
    ports:
      - "8080:8080"
    depends_on:
      - dao-service

volumes:
  pgdata: